name: CI - Django Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Django system check
        env:
          SECRET_KEY: "dummy-secret-key-for-ci"
          DEBUG: "True"
          INSTAGRAM_ACCESS_TOKEN: "dummy-token"
          IG_USER_ID: "dummy-ig-token"
        run: |
          python manage.py check

      # ❌ intentionally removed makemigrations check (temporary)